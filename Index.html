<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndramayuCLUB | Piramida Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* Video Background */
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        #video-background iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Efek Transparan Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .glass-card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }

        .nur-id { font-weight: 800; font-size: 10px; color: #d8b4fe; margin-top: 5px; text-transform: uppercase; }

        /* Tirai */
        #curtain-container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: 1.5s cubic-bezier(0.85, 0, 0.15, 1); 
        }
        .curtain-open { transform: translateY(-100%); opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="video-background">
        <iframe src="https://www.youtube.com/embed/XYFDBw0YoYg?autoplay=1&mute=1&loop=1&playlist=XYFDBw0YoYg&controls=0&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div id="curtain-container">
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-black tracking-tighter text-white">Indramayu<span class="text-purple-500">CLUB</span></h1>
            <p class="text-gray-400 text-xs">SISTEM PIRAMIDA GUARD</p>
        </div>
        <button onclick="bukaTirai()" class="bg-purple-600 text-white px-10 py-4 rounded-full font-bold shadow-[0_0_20px_rgba(147,51,234,0.5)] hover:bg-purple-700 transition">MASUK KE DASHBOARD</button>
    </div>

    <header class="bg-black/60 text-white p-4 shadow-lg sticky top-0 z-50 backdrop-blur-lg border-b border-white/10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-extrabold text-lg tracking-tight">Indramayu<span class="text-purple-400">CLUB</span></h1>
            <div id="clock" class="text-[10px] font-mono bg-purple-900/40 px-3 py-1 rounded-full border border-purple-500/30">00:00:00</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-red-600/80 text-white p-4 rounded-2xl text-[10px] font-bold border border-red-400 shadow-lg backdrop-blur-md">
            ⚠️ PIRAMIDA GUARD AKTIF: Menjaga stabilitas infrastruktur Kalimantan & Global.
        </div>

        <h2 class="text-purple-300 font-black text-xs uppercase tracking-[0.2em] px-1">Sistem Inti Ai</h2>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card" onclick="alert('Membuka Ai Club')">
                <img src="Ai_Club.jpeg" class="w-full aspect-square object-cover rounded-lg mb-2 border border-white/10" onerror="this.src='https://via.placeholder.com/150?text=Ai+Club'">
                <p class="text-xs font-bold">Ai Club</p>
                <span class="nur-id">Nur 01</span>
            </div>

            <div class="glass-card" onclick="alert('Membuka Diskusi Makrifat')">
                <img src="diskusi_makrifat.jpeg" class="w-full aspect-square object-cover rounded-lg mb-2 border border-white/10" onerror="this.src='https://via.placeholder.com/150?text=Diskusi'">
                <p class="text-xs font-bold">Diskusi Makrifat</p>
                <span class="nur-id">Nur 02</span>
            </div>

            <div class="glass-card" onclick="alert('Membuka Ai Administrasi')">
                <img src="ai_administrasi.jpeg" class="w-full aspect-square object-cover rounded-lg mb-2 border border-white/10" onerror="this.src='https://via.placeholder.com/150?text=Admin'">
                <p class="text-xs font-bold">Ai Administrasi</p>
                <span class="nur-id">Nur 03</span>
            </div>

            <div class="glass-card" onclick="alert('Membuka Motherboard AI')">
                <img src="motherboard_ai.jpeg" class="w-full aspect-square object-cover rounded-lg mb-2 border border-white/10" onerror="this.src='https://via.placeholder.com/150?text=System'">
                <p class="text-xs font-bold">Motherboard AI</p>
                <span class="nur-id">Nur 04</span>
            </div>

            <div class="glass-card" onclick="alert('Membuka Ai Kreatif')">
                <img src="Ai_kreatif.jpeg" class="w-full aspect-square object-cover rounded-lg mb-2 border border-white/10" onerror="this.src='https://via.placeholder.com/150?text=Kreatif'">
                <p class="text-xs font-bold">Ai Kreatif</p>
                <span class="nur-id">Nur 05</span>
            </div>

            <div class="glass-card" onclick="alert('Membuka Bank Indramayu')">
                <img src="bank_Indramayu.jpeg" class="w-full aspect-square object-cover rounded-lg mb-2 border border-white/10" onerror="this.src='https://via.placeholder.com/150?text=Bank'">
                <p class="text-xs font-bold">Bank Indramayu</p>
                <span class="nur-id">Nur 06</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 pb-10">
            <button onclick="syncPiramida()" class="bg-white/10 text-white p-4 rounded-2xl font-bold text-[10px] border border-white/20 backdrop-blur-md active:scale-95 transition">
                🔄 SYNC FOLDER
            </button>
            <button onclick="resetSistem()" class="bg-red-600/90 text-white p-4 rounded-2xl font-bold text-[10px] shadow-[0_0_15px_rgba(220,38,38,0.4)] active:scale-95 transition">
                🛡️ RESET SYSTEM
            </button>
        </div>
    </main>

    <script>
        function bukaTirai() {
            document.getElementById('curtain-container').classList.add('curtain-open');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }

        function syncPiramida() {
            alert("Sinkronisasi Sistem Piramida Guard Berhasil!");
        }

        function resetSistem() {
            if(confirm("Apakah Anda yakin ingin mereset sistem?")) {
                location.reload();
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
