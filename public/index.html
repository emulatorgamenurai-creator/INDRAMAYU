<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nurMaster - Satu Komando</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; padding: 20px; }
        .chat-box { border: 1px solid #00ff41; height: 350px; overflow-y: auto; padding: 15px; background: #000; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; flex-grow: 1; padding: 12px; font-family: monospace; }
        button { background: #00ff41; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h3>🛡️ PUSAT KOMANDO: nurMaster (Sektor 1-10)</h3>
    <div class="chat-box" id="chat">[SYSTEM]: Menunggu perintah Lead Architect Dulkohar...</div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Ketik perintah Satu Komando...">
        <button onclick="kirim()">KIRIM</button>
    </div>

    <script>
        async function kirim() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const pesan = input.value;
            if(!pesan) return;
            
            chat.innerHTML += `<div><br>> Architect: ${pesan}</div>`;
            input.value = '';

            try {
                // Menuju port 4001 sesuai monitor sistem terbaru
                const response = await fetch('http://localhost:4001/api/run?name=nurMasterFlow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { input: pesan } })
                });
                const result = await response.json();
                chat.innerHTML += `<div><br>> nurMaster: ${result.result || result.output}</div>`;
            } catch (e) {
                chat.innerHTML += `<div style="color:red"><br>!! ERROR: Gagal terhubung ke Otak AI (Port 4001)</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
